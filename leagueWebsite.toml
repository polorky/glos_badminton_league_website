[project]
name = "LeagueWebsite"
version = "1.0.0"
requires-python = ">=3.10"
dependencies = [
    "django==5.2.11",
    "django_extensions==4.1",
    "RapidFuzz==3.14.3",
    "pandas==2.3.3",
    "numpy==2.2.6",
    "python-decouple==3.8",
    "pytz==2021.3",
]

[project.optional-dependencies]
dev = [
    "mypy",
    "django-stubs",
    "pandas-stubs",
    "ruff",
    "pytest",
]

[tool.mypy]
python_version = "3.10"
plugins = ["mypy_django_plugin.main"]

[tool.ruff.lint]
ignore = ["F405","F403"]

[tool.django-stubs]
django_settings_module = "leagueWebsite.settings"